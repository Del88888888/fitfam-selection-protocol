<!DOCTYPE html>
<html>
<head>
<title>FitFam Selection Protocol</title>

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

h1 { color:#FFD200; font-size:90px; }
h2 { font-size:65px; }
h3 { font-size:50px; }

p { font-size:42px; line-height:1.5; }

.introBox, .resultBox {
  border:3px solid #FFD200;
  padding:25px;
  margin:25px auto;
  width:90%;
  border-radius:15px;
}

button {
  font-size:42px;
  padding:20px 40px;
  margin-top:25px;
  background:#FFD200;
  color:black;
  border:none;
  border-radius:10px;
}

input, select {
  font-size:42px;
  padding:12px;
  width:220px;
  margin:12px;
  text-align:center;
}

.hidden { display:none; }
</style>
</head>

<body>

<h1>FITFAM</h1>
<h2>SELECTION PROTOCOL</h2>
<h3>CODENAME: ZERO HOUR // 10 MINS+</h3>

<!-- INTRO -->
<div id="intro">
<div class="introBox">
<p>
Welcome to the Selection Protocol.<br><br>
All exercises are performed for 2 minutes each.<br><br>
Strength • Endurance • Conditioning
</p>
</div>

<button onclick="start()">BEGIN ASSESSMENT</button>
</div>

<!-- INPUT -->
<div id="inputScreen" class="hidden">

<h2>ENTER DETAILS</h2>

<p>Age</p>
<input id="age">

<p>Sex</p>
<select id="sex">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<h2>RESULTS</h2>

<p>Push-Ups (2 min)</p><input id="push">
<p>Sit-Ups (2 min)</p><input id="sit">
