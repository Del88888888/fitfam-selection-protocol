<!DOCTYPE html>
<html>
<head>
<title>FitFam Selection Protocol</title>

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

h1 { color:#FFD200; font-size:90px; }
h2 { font-size:65px; }
h3 { font-size:50px; }

p { font-size:42px; line-height:1.5; }

.introBox, .resultBox {
  border:3px solid #FFD200;
  padding:25px;
  margin:25px auto;
  width:90%;
  border-radius:15px;
}

button {
  font-size:42px;
  padding:20px 40px;
  margin-top:25px;
  background:#FFD200;
  color:black;
  border:none;
  border-radius:10px;
}

input, select {
  font-size:42px;
  padding:12px;
  width:220px;
  margin:12px;
  text-align:center;
}

.hidden { display:none; }

/* ✅ CORNER IMAGE (NEW) */
#cornerLogo {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 100px;
  border-radius: 50%;
  border: 3px solid #FFD200;
  z-index: 1000;
}
</style>

<script>

let plank = 0;
let timer = null;

function start(){
 document.getElementById("intro").style.display="none";
 document.getElementById("inputScreen").style.display="block";
}

function goFinal(){
 document.getElementById("inputScreen").style.display="none";
 document.getElementById("finalScreen").style.display="block";
}

function startTimer(){
 if(timer) return;

 plank=0;

 timer=setInterval(function(){
  plank++;

  let m=Math.floor(plank/60);
  let s=plank%60;

  document.getElementById("timer").innerText =
  (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
 },1000);
}

function stopTimer(){

 clearInterval(timer);

 try{

 let age = Number(document.getElementById("age").value) || 30;
 let sex = document.getElementById("sex").value;

 let push=Number(document.getElementById("push").value)||0;
 let sit=Number(document.getElementById("sit").value)||0;
 let squat=Number(document.getElementById("squat").value)||0;
 let run=Number(document.getElementById("run").value)||0;

 let factor = 1;

 if(sex === "female") factor *= 0.85;
 if(age >= 40 && age < 50) factor *= 0.9;
 if(age >= 50) factor *= 0.8;

 let pushBase = 40 * factor;
 let sitBase = 55 * factor;
 let squatBase = 60 * factor;

 function score(val, base){
  if(val < base*0.3) return 0;
  if(val < base*0.7) return 1;
  if(val < base) return 2;
  if(val < base*1.2) return 3;
  if(val < base*1.4) return 4;
  return 5;
 }

 function shuttleScore(val){
  if(val < 3) return 0;
  if(val <=5) return 1;
  if(val <=7) return 2;
  if(val <=11) return 3;
  if(val <=14) return 4;
  return 5;
 }

 function plankScore(sec){
  if(sec < 45) return 0;
  if(sec <=104) return 1;
  if(sec <=149) return 2;
  if(sec <=179) return 3;
  if(sec <=209) return 4;
  return 5;
 }

 function label(s){
  if(s==0) return "⚪ Keep going — try harder next time";
  if(s==1) return "⚪ Emerging Athlete";
  if(s==2) return "🔹 Performance Athlete";
  if(s==3) return "✅ Mission Ready";
  if(s==4) return "⭐ Elite Operator";
  if(s==5) return "🔥 Special Forces Target";
 }

 let ps=score(push,pushBase);
 let ss=score(sit,sitBase);
 let qs=score(squat,squatBase);
 let rs=shuttleScore(run);
 let pls=plankScore(plank);

 let avg=(ps+ss+qs+rs+pls)/5;

 document.getElementById("finalScreen").style.display="none";
 document.getElementById("resultScreen").style.display="block";

 if(avg < 1){
  resultText.innerHTML =
  "<div style='font-size:65px;font-weight:bold;'>STATUS: SYSTEM REBOOT REQUIRED</div><br>"+
  "Minimal movement detected<br>"+
  "Physical systems appear to be in sleep mode.<br><br>"+
  "Move more • Start small • Try again";
  return;
 }

 let overall = avg<2.5 ? "🔹 PERFORMANCE ATHLETE"
             : avg<3.5 ? "✅ MISSION READY"
             : avg<4.5 ? "⭐ ELITE OPERATOR"
             : "🔥 SPECIAL FORCES TARGET";

 function next(avg){
  if(avg<2.5) return "✅ MISSION READY";
  if(avg<3.5) return "⭐ ELITE OPERATOR";
  return "🔥 SPECIAL FORCES TARGET";
 }

 function improve(val, base){
  return Math.max(0, Math.ceil(base*1.2 - val));
 }

 resultText.innerHTML =

 "<div style='font-size:65px;font-weight:bold;'>STATUS: "+overall+"</div><br><br>"+

 "Push-Ups: "+push+" → "+label(ps)+"<br>"+
 "Sit-Ups: "+sit+" → "+label(ss)+"<br>"+
 "Squats: "+squat+" → "+label(qs)+"<br>"+
 "Shuttle Run: "+run+" → "+label(rs)+"<br>"+
 "Plank: "+plank+" sec → "+label(pls)+"<br><br>"+

 "<b>Next Target: "+next(avg)+"</b><br>"+
 "+ "+improve(push,pushBase)+" Push-Ups<br>"+
 "+ "+improve(sit,sitBase)+" Sit-Ups<br>"+
 "+ "+improve(plank,150)+" sec Plank";

 }catch(e){
  resultText.innerHTML="Error — please retry";
 }

}

</script>

</head>

<body>
